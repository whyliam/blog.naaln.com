  apiKey: 004cb5884c6903947d25c8cb8ba4ab3b
  chunkSize: 5000
  indexName: blog
  fields:
    - title
    - tags
    - date
    - categories
    - content:strip:truncate,0,500
    - permalink
    - photos
excerpt:
  depth: 6
  excerpt_excludes:
    - h1
    - h2
    - h3
    - h4
    - h5
    - h6
    - table
    - iframe
    - hr
